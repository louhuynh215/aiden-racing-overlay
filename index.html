<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aiden Racing Stats</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    .overlay {
      width: 760px;
      padding: 22px;
      box-sizing: border-box;
      border-radius: 18px;
      color: white;
      background: rgba(10, 14, 22, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 18px;
    }

    .name {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 1.5px;
    }

    .series {
      font-size: 16px;
      opacity: 0.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      text-align: center;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.65;
      margin-bottom: 6px;
    }

    .value {
      font-size: 28px;
      font-weight: 800;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.55;
      text-align: right;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="header">
      <div class="name">AIDEN RACING</div>
      <div class="series">Formula 4 Career Stats</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">iRating</div>
        <div class="value" id="irating">2646</div>
      </div>

      <div class="stat">
        <div class="label">Starts</div>
        <div class="value" id="starts">220</div>
      </div>

      <div class="stat">
        <div class="label">Wins</div>
        <div class="value" id="wins">35</div>
      </div>

      <div class="stat">
        <div class="label">Top 5s</div>
        <div class="value" id="top5">85</div>
      </div>
    </div>

    <div class="footer">
      Customer ID 1086876
    </div>
  </div>
</body>
</html>
